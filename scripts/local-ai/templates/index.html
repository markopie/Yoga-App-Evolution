<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Yoga Local AI Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --border: #dadce0;
      --accent: #ef3340;
      --good: #137333;
      --bad: #b3261e;
      --code: #f1f3f4;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
    }

    main {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    label {
      display: block;
      font-weight: 650;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      min-height: 150px;
      resize: vertical;
      padding: 12px;
      font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      margin-right: 8px;
      margin-top: 12px;
    }

    button.secondary {
      background: #3c4043;
    }

    button.ghost {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .ok {
      color: var(--good);
      font-weight: 700;
    }

    .bad {
      color: var(--bad);
      font-weight: 700;
    }

    pre {
      background: var(--code);
      padding: 12px;
      border-radius: 10px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 12px;
      background: #fff;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f1f3f4;
    }

    .full {
      grid-column: 1 / -1;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f1f3f4;
      border: 1px solid var(--border);
      margin-right: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1 class="title">Yoga Local AI Helper</h1>
    <p class="subtitle">
      Read-only local Supabase querying through Ollama.
      <span class="pill">Model: {{ ollama_model }}</span>
      <span class="pill">Ollama: {{ ollama_base_url }}</span>
      <span class="pill">DB: {{ db_url_masked }}</span>
    </p>
  </header>

  <main>
    <div class="grid">
      <section class="card">
        <label for="question">Ask a database question</label>
        <textarea id="question" placeholder="Example: Show me the first 20 curriculum nodes with their week, day, and title."></textarea>
        <div>
          <button onclick="draftSql()">Draft SQL</button>
          <button class="ghost" onclick="checkHealth()">Check health</button>
          <button class="ghost" onclick="loadSchema()">Show schema</button>
        </div>
        <div id="draftStatus" class="status"></div>
      </section>

      <section class="card">
        <label for="sql">Review SQL before running</label>
        <textarea id="sql" placeholder="Drafted SQL will appear here. You can edit it before running."></textarea>
        <div>
          <button class="secondary" onclick="runSql()">Run read-only SQL</button>
        </div>
        <div id="runStatus" class="status"></div>
      </section>

      <section class="card full">
        <label>Results</label>
        <div id="results" class="small">No results yet.</div>
      </section>

      <section class="card full">
        <label>Schema / diagnostics</label>
        <pre id="diagnostics">Nothing loaded yet.</pre>
      </section>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function checkHealth() {
      $("diagnostics").textContent = "Checking...";
      const res = await fetch("/health");
      const data = await res.json();
      $("diagnostics").textContent = JSON.stringify(data, null, 2);
    }

    async function loadSchema() {
      $("diagnostics").textContent = "Loading schema...";
      const res = await fetch("/schema");
      const data = await res.json();
      if (data.ok) {
        $("diagnostics").textContent = data.schema || "(No schema returned)";
      } else {
        $("diagnostics").textContent = data.error || "Unknown schema error";
      }
    }

    async function draftSql() {
      const question = $("question").value.trim();
      if (!question) {
        $("draftStatus").innerHTML = '<span class="bad">Please enter a question.</span>';
        return;
      }

      $("draftStatus").textContent = "Drafting SQL...";
      $("results").textContent = "No results yet.";

      const res = await fetch("/draft-sql", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ question, include_schema: true })
      });

      const data = await res.json();

      if (!data.ok) {
        $("draftStatus").innerHTML = `<span class="bad">${escapeHtml(data.error || "Draft failed")}</span>`;
        return;
      }

      $("sql").value = data.sql;

      const css = data.valid ? "ok" : "bad";
      $("draftStatus").innerHTML = `<span class="${css}">${escapeHtml(data.validation_message)}</span>`;
      $("diagnostics").textContent = data.raw_model_response;
    }

    async function runSql() {
      const sql = $("sql").value.trim();
      if (!sql) {
        $("runStatus").innerHTML = '<span class="bad">No SQL to run.</span>';
        return;
      }

      $("runStatus").textContent = "Running read-only SQL...";
      $("results").textContent = "Running...";

      const res = await fetch("/run-sql", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ sql })
      });

      const data = await res.json();

      if (!data.ok) {
        $("runStatus").innerHTML = `<span class="bad">${escapeHtml(data.error || "Query failed")}</span>`;
        $("results").innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
        return;
      }

      $("runStatus").innerHTML = `<span class="ok">Returned ${data.result.row_count} row(s).</span>`;
      renderTable(data.result.columns, data.result.rows);
    }

    function renderTable(columns, rows) {
      if (!columns || columns.length === 0) {
        $("results").textContent = "Query ran, but returned no tabular result.";
        return;
      }

      let html = "<table><thead><tr>";
      for (const col of columns) {
        html += `<th>${escapeHtml(col)}</th>`;
      }
      html += "</tr></thead><tbody>";

      for (const row of rows) {
        html += "<tr>";
        for (const cell of row) {
          html += `<td>${escapeHtml(cell === null ? "" : cell)}</td>`;
        }
        html += "</tr>";
      }

      html += "</tbody></table>";
      $("results").innerHTML = html;
    }

    checkHealth();
  </script>
</body>
</html>
